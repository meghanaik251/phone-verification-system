<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phone Verification</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">
    <h2>Phone Verification</h2>
    
    <div class="input-group">
      <label for="phone">Phone Number</label>
      <input
        type="tel"
        id="phone"
        placeholder="Enter 10-digit mobile number"
        maxlength="10"
      />
      <small id="phoneError" class="error-message"></small>
    </div>

    <button onclick="sendOTP()" id="sendOtpBtn">
      Send OTP
    </button>

    <div id="timerContainer" style="display: none;">
      <div class="timer">
        <span>OTP expires in: </span>
        <span id="timer" class="timer-text">02:00</span>
      </div>
    </div>

    <div class="input-group">
      <label for="otp">Enter OTP</label>
      <input
        type="text"
        id="otp"
        placeholder="Enter 6-digit OTP"
        maxlength="6"
      />
      <small id="otpError" class="error-message"></small>
    </div>

    <button onclick="verifyOTP()" id="verifyOtpBtn" disabled>
      Verify OTP
    </button>

    <div id="message" class="message"></div>
  </div>

   <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
